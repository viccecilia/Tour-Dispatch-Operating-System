services:
  wx-dispatch-demo:
    build: .
    container_name: wx-dispatch-demo
    environment:
      WX_DISPATCH_HOST: 0.0.0.0
      WX_DISPATCH_PORT: 18765
      WX_DISPATCH_BASE_URL: http://127.0.0.1:18765
      WX_DISPATCH_DEMO_MODE: "true"
      WX_DISPATCH_RESET_DEMO_ON_START: "true"
      WX_DISPATCH_DB: /app/runtime/wx_dispatch.sqlite3
      WX_DISPATCH_LOG_DIR: /app/runtime/logs
      WX_DISPATCH_BACKUP_DIR: /app/runtime/backups
    ports:
      - "18765:18765"
    volumes:
      - wx_dispatch_runtime:/app/runtime

  wx-dispatch-frontend:
    build:
      context: ./frontend
    container_name: wx-dispatch-frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:18765
    ports:
      - "5173:5173"
    depends_on:
      - wx-dispatch-demo

volumes:
  wx_dispatch_runtime:
