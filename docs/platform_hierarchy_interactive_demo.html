<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>平台层级管理交互说明</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #fff;
      --ink: #111827;
      --text: #263246;
      --muted: #64748b;
      --line: #d8e1eb;
      --blue: #2563eb;
      --green: #13805f;
      --amber: #af6900;
      --red: #c53a2f;
      --violet: #6d28d9;
      --soft-blue: #e8f1ff;
      --soft-green: #e7f7ef;
      --soft-amber: #fff3dc;
      --soft-red: #fff0ee;
      --soft-violet: #f0eaff;
      --soft-gray: #eef2f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      letter-spacing: 0;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(560px, 1.15fr) minmax(420px, 0.85fr);
      gap: 16px;
      padding: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.07);
      min-width: 0;
      overflow: hidden;
    }

    .head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      color: var(--ink);
      font-size: 23px;
      line-height: 1.2;
    }

    .sub {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--soft-gray);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.blue { background: var(--soft-blue); color: var(--blue); }
    .badge.green { background: var(--soft-green); color: var(--green); }
    .badge.amber { background: var(--soft-amber); color: var(--amber); }
    .badge.violet { background: var(--soft-violet); color: var(--violet); }

    .map {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .node {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      cursor: pointer;
      transition: 0.16s ease;
      text-align: left;
      color: var(--text);
      width: 100%;
      font: inherit;
    }

    .node:hover,
    .node.active {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.13);
      transform: translateY(-1px);
    }

    .node strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.25;
    }

    .node span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .node.platform { background: linear-gradient(180deg, #ffffff, #f5f9ff); }
    .node.market { background: linear-gradient(180deg, #ffffff, #f7fff9); }
    .node.agency { background: #fbfdff; }
    .node.carrier { background: #fffdf8; }

    .topology {
      display: grid;
      gap: 14px;
    }

    .tier {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-items: start;
    }

    .group {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #f8fafc;
      display: grid;
      gap: 10px;
    }

    .group-title {
      color: var(--ink);
      font-size: 14px;
      font-weight: 900;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .children {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .connector {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      gap: 8px;
      padding: 2px 0;
    }

    .connector::before,
    .connector::after {
      content: "";
      height: 1px;
      background: var(--line);
    }

    .detail {
      padding: 18px 20px 20px;
      display: grid;
      gap: 14px;
    }

    .detail h2 {
      color: var(--ink);
      font-size: 20px;
      line-height: 1.25;
    }

    .detail-text {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      background: #fff;
    }

    .section h3 {
      color: var(--ink);
      font-size: 14px;
      margin-bottom: 9px;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    li + li { margin-top: 4px; }

    .flow {
      display: grid;
      gap: 8px;
    }

    .flow-step {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 9px;
      align-items: start;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .flow-step i {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--soft-blue);
      color: var(--blue);
      display: grid;
      place-items: center;
      font-style: normal;
      font-weight: 900;
      font-size: 11px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 520px;
      border-collapse: collapse;
      font-size: 12px;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f8fafc;
      color: var(--muted);
      font-size: 11px;
    }

    td b { color: var(--ink); }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .app { padding: 12px; }
      .head { display: block; }
      .badge-row { justify-content: flex-start; margin-top: 12px; }
      .split,
      .children { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="head">
        <div>
          <h1>平台层级管理图</h1>
          <p class="sub">点击任意板块，右侧会显示对应层级的权限、功能、联动和收费/风控规则。</p>
        </div>
        <div class="badge-row">
          <span class="badge blue">多旅行社</span>
          <span class="badge amber">多车公司</span>
          <span class="badge green">订单大厅</span>
        </div>
      </div>

      <div class="map">
        <div class="topology">
          <div class="tier">
            <button class="node platform active" data-node="platform">
              <strong>总控平台</strong>
              <span>平台运营、规则、风控、财务、仲裁、账号套餐和系统认证担保。</span>
            </button>
          </div>

          <div class="connector">管理公司端口与市场规则</div>

          <div class="split">
            <div class="group">
              <div class="group-title">旅行社公司端 <span class="badge blue">发单方</span></div>
              <button class="node agency" data-node="agencyAdmin">
                <strong>旅行社管理账户</strong>
                <span>公司主账号，配置客服、导游、财务、权限和额度。</span>
              </button>
              <div class="children">
                <button class="node agency" data-node="agencyService">
                  <strong>客服账户</strong>
                  <span>上传订单、改单、补资料、沟通。</span>
                </button>
                <button class="node agency" data-node="agencyGuide">
                  <strong>导游/地接账户</strong>
                  <span>看行程、联系司机、现场反馈。</span>
                </button>
                <button class="node agency" data-node="agencyFinance">
                  <strong>财务账户</strong>
                  <span>账单确认、付款、保证金和额度。</span>
                </button>
                <button class="node agency" data-node="agencyCredit">
                  <strong>授信/保证金</strong>
                  <span>订单金额占用额度，完成付款后释放。</span>
                </button>
              </div>
            </div>

            <div class="group">
              <div class="group-title">车公司端 <span class="badge amber">承运方</span></div>
              <button class="node carrier" data-node="carrierAdmin">
                <strong>车公司管理账户</strong>
                <span>公司主账号，配置调度、运行、财务、司机。</span>
              </button>
              <div class="children">
                <button class="node carrier" data-node="carrierDispatch">
                  <strong>调度账户</strong>
                  <span>报价、接单、派车、改派、异常。</span>
                </button>
                <button class="node carrier" data-node="carrierOps">
                  <strong>运行管理账户</strong>
                  <span>车辆司机状态、安全和服务质量。</span>
                </button>
                <button class="node carrier" data-node="carrierFinance">
                  <strong>财务账户</strong>
                  <span>应收、司机结算、赔付和保证金。</span>
                </button>
                <button class="node carrier" data-node="driver">
                  <strong>司机账户</strong>
                  <span>任务、导航、报备、证据和费用。</span>
                </button>
              </div>
            </div>
          </div>

          <div class="connector">通过平台市场层联动</div>

          <div class="tier">
            <button class="node market" data-node="marketplace">
              <strong>订单大厅 / 公共订单池</strong>
              <span>旅行社发单进入订单池，车公司共享大厅，按规则报价、接单、救急和回程补位。</span>
            </button>
          </div>

          <div class="split">
            <button class="node market" data-node="pricing">
              <strong>定价与等级匹配</strong>
              <span>建议价、保护价、服务等级、旅行社等级、车公司等级共同决定推荐。</span>
            </button>
            <button class="node market" data-node="complaint">
              <strong>客诉仲裁与证据</strong>
              <span>双方上传资料，平台按证据归因，扣分、冻结、赔付都留痕。</span>
            </button>
          </div>

          <div class="split">
            <button class="node market" data-node="accountBilling">
              <strong>账号数量与收费</strong>
              <span>每家公司免费配置一定账号，超额按账号或套餐收费。</span>
            </button>
            <button class="node market" data-node="launch">
              <strong>上线步骤</strong>
              <span>先文档和 demo，再新增数据/API，最后灰度开放报价和风控。</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <aside class="panel">
      <div class="head">
        <div>
          <h1>板块说明</h1>
          <p class="sub">当前选中内容会在这里展开，方便配合规划文档讨论。</p>
        </div>
      </div>
      <div class="detail" id="detail"></div>
    </aside>
  </main>

    function renderDetail(key) {
      const item = details[key];
      const badges = (item.badges || []).map((label, index) => {
        const colors = ["blue", "green", "amber", "violet"];
        return `<span class="badge ${colors[index % colors.length]}">${label}</span>`;
      }).join("");

      const functions = (item.functions || []).map((text) => `<li>${text}</li>`).join("");
      const permissions = (item.permissions || []).map((text) => `<li>${text}</li>`).join("");
      const flow = (item.flow || []).map((text, index) => `<div class="flow-step"><i>${index + 1}</i><span>${text}</span></div>`).join("");
      const table = item.table ? `
        <div class="section">
          <h3>规则表</h3>
          <div class="table-wrap">
            <table>
              <tbody>
                ${item.table.map((row, index) => `<tr>${row.map((cell) => index === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`).join("")}</tr>`).join("")}
              </tbody>
            </table>
          </div>
        </div>` : "";

      document.getElementById("detail").innerHTML = `
        <div>
          <h2>${item.title}</h2>
          <p class="detail-text">${item.desc}</p>
          <div class="badge-row" style="justify-content:flex-start;margin-top:10px;">${badges}</div>
        </div>
        <div class="section">
          <h3>功能</h3>
          <ul>${functions}</ul>
        </div>
        <div class="section">
          <h3>权限</h3>
          <ul>${permissions}</ul>
        </div>
        ${table}
        <div class="section">
          <h3>联动流程</h3>
          <div class="flow">${flow}</div>
        </div>
      `;

      document.querySelectorAll(".node").forEach((node) => {
        node.classList.toggle("active", node.dataset.node === key);
      });
    }

    document.querySelectorAll(".node").forEach((node) => {
      node.addEventListener("click", () => renderDetail(node.dataset.node));
    });

    renderDetail("platform");
