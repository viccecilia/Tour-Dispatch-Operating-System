<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>移动调度端预览</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
    }
    .phone {
      width: 390px;
      height: 844px;
      border-radius: 42px;
      background: #eef3f8;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.36);
      border: 10px solid #111827;
      position: relative;
    }
    .nav {
      height: 54px;
      display: grid;
      place-items: center;
      background: #07111f;
      color: #fff;
      font-weight: 800;
      font-size: 14px;
    }
    .content {
      height: calc(100% - 112px);
      overflow: auto;
      padding: 16px;
    }
    .hero {
      border-radius: 24px;
      padding: 22px;
      color: #fff;
      background: linear-gradient(135deg, #07111f 0%, #123e78 58%, #1d4ed8 100%);
      box-shadow: 0 14px 32px rgba(15,23,42,.18);
    }
    .eyebrow { font-size: 11px; opacity: .75; letter-spacing: .08em; }
    .title { margin-top: 6px; font-size: 28px; font-weight: 900; }
    .meta { margin-top: 8px; font-size: 13px; opacity: .82; }
    .panel {
      margin-top: 14px;
      border: 1px solid #dbe5f0;
      border-radius: 22px;
      padding: 16px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(15,23,42,.07);
    }
    .panel h2 {
      margin: 0 0 10px;
      font-size: 17px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .metric {
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 12px;
    }
    .metric span { display: block; color: #64748b; font-size: 12px; }
    .metric strong { display: block; margin-top: 4px; font-size: 26px; }
    .card {
      border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #f8fbff 100%);
      border: 1px solid #dbeafe;
      padding: 14px;
      margin-top: 10px;
    }
    .card-title { font-size: 15px; font-weight: 900; }
    .muted { margin-top: 5px; color: #64748b; font-size: 12px; line-height: 1.45; }
    .status {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 9px;
      background: #dcfce7;
      color: #15803d;
      font-weight: 800;
      font-size: 11px;
      margin-left: 8px;
    }
    .quick {
      position: sticky;
      bottom: 0;
      margin-top: 14px;
      border-radius: 22px;
      padding: 14px;
      background: #07111f;
      color: #fff;
      box-shadow: 0 18px 46px rgba(15,23,42,.25);
    }
    .button {
      margin-top: 10px;
      height: 48px;
      border-radius: 16px;
      background: #16a34a;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
    }
    .tabbar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 58px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: rgba(255,255,255,.96);
      border-top: 1px solid #dbe5f0;
    }
    .tab {
      display: grid;
      place-items: center;
      font-size: 12px;
      color: #64748b;
      font-weight: 800;
    }
    .tab.active {
      color: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="nav">移动调度</div>
    <div class="content">
      <section class="hero">
        <div class="eyebrow">DISPATCH MOBILE PILOT</div>
        <div class="title">系统管理员</div>
        <div class="meta">D001 · admin · 移动调度试运行</div>
      </section>

      <section class="panel">
        <h2>今日运行</h2>
        <div class="grid">
          <div class="metric"><span>今日订单</span><strong>40</strong></div>
          <div class="metric"><span>未派车</span><strong>10</strong></div>
          <div class="metric"><span>在线司机</span><strong>0</strong></div>
          <div class="metric"><span>待确认</span><strong>22</strong></div>
        </div>
      </section>

      <section class="panel">
        <h2>快速派车</h2>
        <div class="card">
          <div class="card-title">D260530-001 · KIX → 心斋桥微笑酒店</div>
          <div class="muted">2026-05-30 08:00 · 3代 · ¥600</div>
        </div>
        <div class="card">
          <div class="card-title">姚博 <span class="status">在线</span></div>
          <div class="muted">当前：空闲 · 下一空闲：现在可用</div>
        </div>
        <div class="card">
          <div class="card-title">なにわ330を1001 <span class="status">空闲</span></div>
          <div class="muted">ハイエース · 10座 · ETC待录</div>
        </div>
      </section>

      <section class="quick">
        <div class="card-title">1 单 → 姚博 → なにわ330を1001</div>
        <div class="muted">D260530-001</div>
        <div class="button">一键派车</div>
      </section>
    </div>
    <nav class="tabbar">
      <div class="tab active">首页</div>
      <div class="tab">导入</div>
      <div class="tab">派车</div>
      <div class="tab">地图</div>
      <div class="tab">我的</div>
    </nav>
  </main>
</body>
</html>
